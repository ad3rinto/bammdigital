<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAMM Digital</title>
    <meta name="description" content="BAMM Digital helps teams simplify processes and deliver smarter digital transformation." />
    <link rel="icon" type="image/svg+xml" href="/assets/bamm-logo.svg" />
    <link rel="shortcut icon" href="/assets/bamm-logo.svg" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f5f2;
        --surface: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --accent: #0f172a;
        --accent-soft: #5eead4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Lato', Arial, sans-serif;
        background: linear-gradient(135deg, var(--bg), #ecebe7);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(92vw, 860px);
        background: var(--surface);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 24px;
        padding: 2.25rem;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      }
      .hero {
        display: flex;
        gap: 2rem;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .brand-mark {
        width: 128px;
        height: 128px;
        flex-shrink: 0;
      }
      h1 {
        font-family: 'Montserrat', Arial, sans-serif;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
        margin: 0 0 0.75rem;
      }
      p { margin: 0; color: var(--muted); font-size: 1.05rem; line-height: 1.7; }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 0.5rem;
      }
      .actions {
        margin-top: 1.4rem;
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      a.button {
        display: inline-block;
        padding: 0.8rem 1.1rem;
        border-radius: 999px;
        text-decoration: none;
        background: var(--accent);
        color: white;
        font-weight: 700;
      }
      a.button.secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid rgba(15, 23, 42, 0.14);
      }
      @media (max-width: 640px) {
        .card { padding: 1.4rem; }
        .brand-mark { width: 96px; height: 96px; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="hero">
        <img class="brand-mark" src="/assets/bamm-logo.svg" alt="BAMM Digital logo" />
        <div>
          <p class="eyebrow">BAMM Digital</p>
          <h1>Process improvement. Digital transformation.</h1>
          <p>We help teams simplify operations, modernize systems, and create more thoughtful digital experiences.</p>
          <div class="actions">
            <a class="button" href="mailto:hello@bammdigital.com">Let’s talk</a>
            <a class="button secondary" href="https://www.linkedin.com/" target="_blank" rel="noreferrer">View profile</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
